version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cde-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-cde_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cde_password}
      POSTGRES_DB: ${DB_NAME:-cde_appointments}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - appointment-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cde_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cde-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-cde_user}
      DB_PASSWORD: ${DB_PASSWORD:-cde_password}
      DB_NAME: ${DB_NAME:-cde_appointments}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_change_in_production}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-your_email@gmail.com}
      MAIL_PASS: ${MAIL_PASS:-your_email_password}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - appointment-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cde-frontend
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000/api}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - appointment-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:

networks:
  appointment-network:
    driver: bridge
